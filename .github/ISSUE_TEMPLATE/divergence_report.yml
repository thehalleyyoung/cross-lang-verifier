name: Divergence report
description: Report a suspected cross-language semantic divergence.
title: "[divergence] "
labels: ["divergence", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Please include enough information for the oracle to replay the source and target.
        Confirmed divergences should include a witness and a safe control.
  - type: input
    id: pair
    attributes:
      label: Language pair
      description: Example: C -> Rust, C -> Go, Rust -> C.
      placeholder: C -> Rust
    validations:
      required: true
  - type: input
    id: class
    attributes:
      label: Divergence class
      description: Example: signed_overflow, memcpy_overlap, strict_aliasing.
      placeholder: signed_overflow
    validations:
      required: true
  - type: textarea
    id: manifest
    attributes:
      label: Minimal manifest or reproduction
      description: Paste the smallest manifest/code needed to reproduce.
      render: json
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Compiler/runtime evidence
      description: Include CLI output, toolchain versions, and whether the verdict is DIVERGENT, CANDIDATE, UNKNOWN, or NOT-COVERED.
      render: text
    validations:
      required: true
  - type: textarea
    id: safe-control
    attributes:
      label: Safe negative control
      description: Show the input or unit that should not be reported as divergent.
    validations:
      required: true
