name: "Translation Equivalence Guard"
description: >-
  Verify a manifest of cross-language translation units for semantic divergence
  (sound for divergence; multi-pair where registered) and emit SARIF for GitHub
  code scanning.
author: "cross-lang-verifier"
branding:
  icon: "git-merge"
  color: "red"

inputs:
  manifest:
    description: "Path to the JSON units manifest to verify."
    required: true
  sarif:
    description: "Path to write the SARIF 2.1.0 report."
    required: false
    default: "cross-lang-verify.sarif"
  working-directory:
    description: "Directory from which manifest and SARIF paths are resolved."
    required: false
    default: "."
  fail-on:
    description: >-
      Space-separated verdicts that fail the job: any of
      divergent, candidate, unknown, not-covered. Default: divergent.
    required: false
    default: "divergent"
  no-confirm:
    description: >-
      If 'true', skip ground-truth re-execution (symbolic only); witnesses are
      reported as CANDIDATE, never DIVERGENT. Default: 'false'.
    required: false
    default: "false"
  color:
    description: "CLI color mode: auto, always, or never."
    required: false
    default: "always"
  extra-args:
    description: "Additional whitespace-separated cross-lang-verify flags."
    required: false
    default: ""
  python-version:
    description: "Python version used to install and run cross-lang-verifier."
    required: false
    default: "3.11"
  install:
    description: "Install cross-lang-verifier from GitHub before running."
    required: false
    default: "true"
  ref:
    description: "Git ref of cross-lang-verifier to install."
    required: false
    default: "main"

outputs:
  sarif:
    description: "Path to the SARIF report that was written."
    value: ${{ steps.verify.outputs.sarif }}
  exit-code:
    description: "Exit code of the verifier (1 if a fail-on verdict occurred)."
    value: ${{ steps.verify.outputs.exit_code }}

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install cross-lang-verifier
      if: ${{ inputs.install == 'true' }}
      shell: bash
      env:
        CLV_REF: ${{ inputs.ref }}
      run: |
        python -m pip install --upgrade pip
        python -m pip install "git+https://github.com/thehalleyyoung/cross-lang-verifier.git@${CLV_REF}"

    - name: Verify translation units
      id: verify
      shell: bash
      env:
        CLV_MANIFEST: ${{ inputs.manifest }}
        CLV_SARIF: ${{ inputs.sarif }}
        CLV_WORKING_DIRECTORY: ${{ inputs.working-directory }}
        CLV_FAIL_ON: ${{ inputs.fail-on }}
        CLV_NO_CONFIRM: ${{ inputs.no-confirm }}
        CLV_COLOR: ${{ inputs.color }}
        CLV_EXTRA_ARGS: ${{ inputs.extra-args }}
      run: |
        # run.sh invokes: cross-lang-verify --units "$manifest" --sarif "$sarif" --fail-on "$verdict"
        bash "${{ github.action_path }}/run.sh"
