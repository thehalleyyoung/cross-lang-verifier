site_name: cross-lang-verifier
site_description: >-
  A C→{Rust,Go,Swift} cross-language semantic-divergence oracle rooted in C
  undefined behaviour — every claim proven against real compiled code.
docs_dir: docs
theme:
  name: readthedocs

validation:
  nav:
    omitted_files: ignore
    not_found: warn
  links:
    absolute_links: ignore
    unrecognized_links: ignore
    not_found: ignore

nav:
  - Home: index.md
  - Tutorial (quickstart): tutorial.md
  - Gallery of caught divergences: gallery.md
  - Divergence zoo (indexed): zoo.md
  - Case studies (end-to-end): case_studies.md
  - Disclosures (reproducible): disclosures.md
  - Divergence findings (responsible): divergence_findings.md
  - Paper figures: figures.md
  - Concepts:
      - Problem statement: problem_statement.md
      - Architecture: architecture.md
      - Frontends & SPI: FRONTENDS.md
      - Target semantics: SEMANTICS.md
      - Shared IR contract: IR.md
      - Product-program oracle: PRODUCT_PROGRAM.md
      - Translation validation: TRANSLATION_VALIDATION.md
      - VLA-bound divergence class: vla_bound.md
      - Float-cast-overflow divergence class: float_cast.md
      - Fast-math reassociation divergence class: fast_math.md
      - Restrict-violation divergence class: restrict_alias.md
      - Pointer-provenance divergence class: pointer_provenance.md
  - Soundness & completeness:
      - Per-pair soundness statements: COMPLETENESS.md
      - Mechanized soundness (Lean): MECHANIZED_SOUNDNESS.md
      - Claim → proof traceability: TRACEABILITY.md
      - True-green test ratchet: test_ratchet.md
      - Large-scale study (>130k LOC): large_scale_study.md
  - Integrations:
      - Transpiler recipes: TRANSPILER_RECIPES.md
      - Pre-commit hook: pre_commit.md
      - LSP diagnostics: LSP.md
      - Web playground: PLAYGROUND.md
      - Plugin SDK: SDK.md
  - Reproducibility:
      - Artifact evaluation: ARTIFACT.md
      - External pre-review packet: PRE_REVIEW.md
      - Positioning: POSITIONING.md
